services:
  postgres:
    image: postgres:16-alpine
    container_name: house_prices_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-house_prices}
      POSTGRES_USER: ${POSTGRES_USER:-prices}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - ./data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    networks:
      - house_prices_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-prices} -d ${POSTGRES_DB:-house_prices}"]
      interval: 30s
      timeout: 10s
      retries: 3

  grafana:
    image: grafana/grafana:latest
    container_name: house_prices_grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_INSTALL_PLUGINS: ""
      GF_SERVER_ROOT_URL: "https://prices.picxi.uk"
      GF_SERVER_SERVE_FROM_SUB_PATH: "false"
    volumes:
      - ./grafana:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3001:3000"
    networks:
      - house_prices_net
    depends_on:
      postgres:
        condition: service_healthy
    user: "472"

  ingest:
    build:
      context: ./ingest
      dockerfile: Dockerfile
    dns:
      - 1.1.1.1
      - 8.8.8.8
    container_name: house_prices_ingest
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB:-house_prices}
      POSTGRES_USER: ${POSTGRES_USER:-prices}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TARGET_COUNTIES: ${TARGET_COUNTIES}
    volumes:
      - ./logs:/app/logs
    networks:
      - house_prices_net
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - ingest

  postcode-ingest:
      build:
        context: ./ingest
        dockerfile: Dockerfile
      container_name: house_prices_postcode_ingest
      environment:
        POSTGRES_HOST: postgres
        POSTGRES_DB: ${POSTGRES_DB:-house_prices}
        POSTGRES_USER: ${POSTGRES_USER:-prices}
        POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      volumes:
        - ./postcode_csv:/app/postcode_csv:ro
        - ./ingest:/app
      networks:
        - house_prices_net
      depends_on:
        postgres:
          condition: service_healthy
      profiles:
        - postcode

networks:
  house_prices_net:
    driver: bridge
